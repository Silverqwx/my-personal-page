<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Graduation cap - top diamond -->
  <polygon points="256,120 420,200 256,280 92,200" fill="#ffffff" opacity="0.95"/>
  <!-- Graduation cap - front fold -->
  <polygon points="256,280 420,200 420,220 256,300" fill="#d0d8e8" opacity="0.9"/>
  <polygon points="256,280 92,200 92,220 256,300" fill="#e8ecf4" opacity="0.9"/>
  <!-- Tassel line -->
  <line x1="380" y1="200" x2="380" y2="310" stroke="#f0c040" stroke-width="8" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="380" cy="318" r="14" fill="#f0c040"/>
  <!-- Bottom strings for cap body -->
  <path d="M160,230 L160,320 Q256,380 352,320 L352,230" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
</svg>
